<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>PostFlow</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 360px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0b10;
        color: #f4f4f6;
      }
      .wrap { padding: 16px; }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        background: linear-gradient(135deg, #ff3d8b, #ff8a3d);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .sub { font-size: 12px; color: #9aa0aa; margin-bottom: 14px; }
      label { display: block; font-size: 11px; color: #9aa0aa; margin: 10px 0 6px; }
      input {
        width: 100%;
        background: #16161e;
        border: 1px solid #26262f;
        color: #f4f4f6;
        padding: 9px 10px;
        border-radius: 10px;
        font-size: 12px;
        outline: none;
      }
      input:focus { border-color: #ff3d8b; }
      .btns { display: flex; gap: 6px; margin-top: 10px; }
      button {
        flex: 1;
        background: linear-gradient(135deg, #ff3d8b, #ff8a3d);
        color: white;
        border: 0;
        padding: 9px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        border: 1px solid #26262f;
        color: #f4f4f6;
        font-weight: 500;
      }
      button.danger {
        background: transparent;
        border: 1px solid rgba(239,68,68,0.4);
        color: #fca5a5;
        font-weight: 500;
      }
      .status {
        margin-top: 12px;
        padding: 9px 10px;
        border-radius: 10px;
        background: #16161e;
        border: 1px solid #26262f;
        font-size: 12px;
        color: #9aa0aa;
      }
      .status.ok { border-color: rgba(34,197,94,0.4); color: #86efac; }
      .status.err { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
      .posts { margin-top: 12px; max-height: 240px; overflow: auto; }
      .post {
        padding: 8px 10px;
        background: #16161e;
        border: 1px solid #26262f;
        border-radius: 10px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .post.next { border-color: #ff3d8b; }
      .post .t { font-weight: 600; }
      .post .m { color: #9aa0aa; font-size: 11px; margin-top: 2px; }
      .empty { font-size: 12px; color: #9aa0aa; text-align: center; padding: 14px 0; }
      .toggle {
        margin-top: 10px;
        background: transparent;
        border: 0;
        color: #9aa0aa;
        font-size: 11px;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PostFlow Notifier</h1>
      <div class="sub">Notificações dos seus posts agendados</div>

      <div id="setup" style="display:none">
        <label for="token">Token (Settings → Integração com Extensão Chrome)</label>
        <input id="token" type="password" placeholder="pf_..." autocomplete="off" />
        <div class="btns">
          <button id="save">Conectar</button>
        </div>
        <div id="setup-status" class="status" style="display:none"></div>
      </div>

      <div id="connected" style="display:none">
        <div class="btns">
          <button id="refresh" class="secondary">Atualizar</button>
          <button id="edit" class="secondary">Editar token</button>
          <button id="disconnect" class="danger">Sair</button>
        </div>
        <div id="status" class="status">Carregando...</div>
        <div id="posts" class="posts"></div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
